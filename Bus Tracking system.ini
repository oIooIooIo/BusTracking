# Bus Tracking system
  
## Basic Define
  -small project
  -maybe merge into another big project in the future(car booking system)

## Purpose
 -Bus route tracking
 -Display routes on the WebUI
 -Company employees must swipe their employee ID cards to board the bus

## System requirement
 -one Android app(Install on the bus)
 -one Admin panel

## Android
Env: Android version 13

Functuin:
    1. 開機自動開啟App
    2. App會紀錄公車GPS,每10秒會儲存一次GPS資訊
    3. 在有網路的環境下, 會自動將GPS上傳到伺服器
    4. 可以刷員工識別證, 檢查員工是否有權限搭這台Bus(NFC感應)

# Admin panel
Env: 
 - Backend: Java 21, Spring Boot 3, Spring Data JPA, Flyway, OpenAPI/Swagger
 - Admin Web: React, Vite, TypeScript, Ant Design
 - Database: PostgreSQL with PostGIS
 - Cache/Queue: Redis
Functuin:
    1. 管理公車有哪些員工可以搭乘
    2. 顯示公車行跡圖
