spring.application.name=bus-tracking-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bus_tracking}
spring.datasource.username=${DB_USERNAME:bus_tracking}
spring.datasource.password=${DB_PASSWORD:bus_tracking}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.device.api-key=${DEVICE_API_KEY:demo-device-key}
app.cors.allowed-origin=${ADMIN_WEB_ORIGIN:http://localhost:5173}
